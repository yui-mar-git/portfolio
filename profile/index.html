<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私について - My Portfolio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>

<body id="profile">

  <header data-depth="1"></header>

  <main class="container">
    <article>
      <span class="page-label">PROFILE</span>
      <h1>プロフィール</h1>

      <section class="profile-intro">
        <p id="profile-title" class="profile-title-text"></p>
        <h2 id="profile-name-display" class="profile-name-text">読み込み中...</h2>
        <p id="profile-bio" class="profile-bio-text"></p>
      </section>

      <section>
        <h2>使用したスキル・ツール</h2>
        <div id="skills-container">
          <!-- スキルとツールがカテゴリ別にここに生成される -->
        </div>
      </section>

      <section>
        <h2>保有資格・検定</h2>
        <div class="cert-tree-container">
          <div class="cert-tree" id="cert-tree-root">
            <!-- Dynamic certification tree will be generated here -->
          </div>
        </div>
      </section>
    </article>
  </main>

  <footer class="container"></footer>

  <script src="../header.js"></script>
  <script src="../footer.js"></script>
  <script src="../script.js"></script>
  <script src="../env.js"></script>
  <script src="../profile/profile.js"></script>
</body>

</html>
