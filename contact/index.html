<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - My Portfolio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>

<body id="contact">

  <header data-depth="1"></header>

  <main class="container">
    <article>
      <h1>お問い合わせ</h1>
      <section class="hero">
        <p>お仕事のご依頼やご相談は、こちらのフォームからお気軽にご連絡ください。</p>

        <div class="contact-form-container">
          <div class="form-group">
            <label class="form-label">お名前</label>
            <input type="text" class="form-control" placeholder="山田 太郎">
          </div>
          <div class="form-group">
            <label class="form-label">メールアドレス</label>
            <input type="email" class="form-control" placeholder="example@email.com">
          </div>
          <div class="form-group-last">
            <label class="form-label">メッセージ</label>
            <textarea rows="5" class="form-control" placeholder="ご用件をご記入ください"></textarea>
          </div>
          <a href="thanks/index.html" class="btn btn-full">送信する</a>
          <p class="dummy-notice">
            ※このフォームはポートフォリオ用のデモ（ダミー）です。<br>
            実際にはどこにもメールは送信されず、データが保存されることもありません。<br>
            送信ボタンを押すと、完了ページ（サンクスページ）のデザインサンプルに遷移します。
          </p>
        </div>
      </section>
    </article>
  </main>

  <footer class="container"></footer>

  <script src="../header.js"></script>
  <script src="../footer.js"></script>
  <script src="../script.js"></script>
</body>

</html>
