<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - My Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <header>
    <div class="container header-container">
      <div class="logo"><a href="../index.html" style="color: inherit;">Portfolio.</a></div>
      <nav>
        <ul>
          <li><a href="../profile/index.html">私について</a></li>
          <li><a href="../portfolio/index.html">制作実績</a></li>
          <li><a href="../contact/index.html" style="color: var(--primary);">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
      <section class="hero">
        <h1>お問い合わせ</h1>
        <p>お仕事のご依頼やご相談は、こちらのフォームからお気軽にご連絡ください。</p>
        
        <div style="margin-top: 3rem; background: var(--surface); padding: 3rem; border-radius: 1rem; max-width: 600px; width: 100%; text-align: left; border: 1px solid rgba(255,255,255,0.05);">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">お名前</label>
                <input type="text" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;" placeholder="山田 太郎">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">メールアドレス</label>
                <input type="email" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;" placeholder="example@email.com">
            </div>
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">メッセージ</label>
                <textarea rows="5" style="width: 100%; padding: 0.8rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white;" placeholder="ご用件をご記入ください"></textarea>
            </div>
            <button class="btn" style="width: 100%;">送信する</button>
        </div>
      </section>
  </main>

  <footer class="container" style="margin-top: 5rem;">
    <p>&copy; 2026 Yui. All rights reserved.</p>
  </footer>

  <script src="../script.js"></script>
</body>

</html>
